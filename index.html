<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chinese Flashcards</title>
<style>
  :root{
    --bg: #0f1115;
    --card-bg: #1b1e26;
    --card-bg-active: #23283a;
    --accent: #4f8cff;
    --accent-off: #2a2f3d;
    --text: #f2f3f5;
    --text-dim: #9aa0ab;
    --green: #34c471;
    --red: #e5534b;
    --grey: #3a3d45;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    user-select: none;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* actual visible height on mobile Safari, overrides above */
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    position: relative;
  }

  /* --- Hamburger menu button --- */
  .menu-btn {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 10px);
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--accent-off);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    z-index: 20;
  }
  .reshuffle-btn {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 10px);
    right: 64px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--accent-off);
    color: var(--text);
    font-size: 19px;
    line-height: 1;
    z-index: 20;
  }
  .reshuffle-btn:active {
    transform: scale(0.93);
  }

  /* --- Top toggle bar --- */
  .set-toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 10px 100px 6px 16px;
    flex-shrink: 0;
  }
  .toggle-btn {
    flex: 1;
    min-width: 42%;
    max-width: 200px;
    padding: 10px 4px;
    border-radius: 12px;
    border: 2px solid var(--accent-off);
    background: var(--accent-off);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.15s ease;
  }
  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .progress {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 4px 0 0 0;
    min-height: 18px;
    flex-shrink: 0;
  }

  /* --- Flashcard --- */
  .card-area {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
  }
  .flashcard {
    width: 100%;
    height: 100%;
    max-width: 420px;
    max-height: 340px;
    background: var(--card-bg);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: background 0.15s ease;
  }
  .flashcard.revealed {
    background: var(--card-bg-active);
  }
  .hanzi {
    font-size: clamp(56px, 16vh, 88px);
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hint {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 6px;
  }
  .pinyin {
    font-size: 24px;
    color: var(--accent);
    font-weight: 600;
    margin-top: 4px;
  }
  .translation {
    font-size: 19px;
    color: var(--text);
    margin-top: 4px;
  }

  /* --- Bottom action buttons --- */
  .actions {
    display: flex;
    gap: 12px;
    padding: 8px 0 8px 0;
    flex-shrink: 0;
  }
  .action-btn {
    flex: 1;
    padding: 16px 0;
    border-radius: 16px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    color: white;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  .action-btn:active {
    transform: scale(0.97);
  }
  .forgot-btn { background: var(--red); }
  .remember-btn { background: var(--green); }
  .action-btn.disabled {
    background: var(--grey);
    color: var(--text-dim);
    pointer-events: none;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    font-size: 16px;
    padding: 20px;
  }
  .restart-btn {
    margin-top: 16px;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
  }

  /* --- Menu overlay / modal --- */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .menu-overlay.hidden {
    display: none;
  }
  .menu-panel {
    width: 100%;
    max-width: 360px;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
  }
  .menu-panel h3 {
    margin: 0 0 6px 0;
    font-size: 18px;
  }
  .menu-hint {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 18px 0;
    line-height: 1.4;
  }
  .menu-count {
    color: var(--text-dim);
    font-size: 13px;
    margin: -10px 0 18px 0;
  }
  .menu-action-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 14px;
    border: none;
    background: var(--accent-off);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .menu-action-btn:active {
    opacity: 0.8;
  }
  .menu-close-btn {
    width: 100%;
    padding: 12px 0;
    border-radius: 14px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  /* --- Word list viewer overlay (dictionary / forgotten) --- */
  .list-panel {
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    max-height: 80dvh;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
  }
  .list-panel h3 {
    margin: 0 0 4px 0;
    font-size: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .list-count {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 12px 0;
    flex-shrink: 0;
  }
  .list-scroll {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  .list-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .list-row .l-hanzi {
    font-size: 22px;
    font-weight: 600;
    min-width: 64px;
  }
  .list-row .l-pinyin {
    font-size: 14px;
    color: var(--accent);
    min-width: 70px;
  }
  .list-row .l-es {
    font-size: 14px;
    color: var(--text-dim);
    text-align: right;
    flex: 1;
  }
  .list-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 20px 0;
  }
</style>
</head>
<body>
<div id="app">

  <button id="reshuffle-btn" class="reshuffle-btn" aria-label="Reiniciar y reordenar">↻</button>
  <button id="menu-btn" class="menu-btn" aria-label="Menú">☰</button>

  <div class="set-toggles">
    <button id="btn-hsk1" class="toggle-btn active">HSK1</button>
    <button id="btn-hsk2" class="toggle-btn active">HSK2</button>
    <button id="btn-dict" class="toggle-btn active">Diccionario personal</button>
    <button id="btn-forgotten" class="toggle-btn active">Difíciles de recordar</button>
  </div>
  <div class="progress" id="progress"></div>

  <div class="card-area">
    <div class="flashcard" id="flashcard">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="actions">
    <button id="forgot-btn" class="action-btn forgot-btn disabled">No me acordaba</button>
    <button id="remember-btn" class="action-btn remember-btn disabled">Lo recordaba</button>
  </div>

  <div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu-panel">
      <h3>Diccionario personal</h3>
      <p class="menu-hint">Archivo CSV con columnas: hanzi, pinyin, es</p>
      <p class="menu-count" id="menu-count"></p>
      <button id="menu-download-btn" class="menu-action-btn">📤 Descargar CSV actual</button>
      <button id="menu-load-btn" class="menu-action-btn">📥 Cargar CSV (reemplaza el actual)</button>
      <input type="file" id="csv-file-input" accept=".csv,text/csv" style="display:none">
      <button id="menu-view-dict-btn" class="menu-action-btn">📖 Ver diccionario personal</button>
      <button id="menu-view-forgotten-btn" class="menu-action-btn">📖 Ver difíciles de recordar</button>
      <button id="menu-close-btn" class="menu-close-btn">Cerrar</button>
    </div>
  </div>

  <div id="list-overlay" class="menu-overlay hidden">
    <div class="list-panel">
      <h3 id="list-title"></h3>
      <p class="list-count" id="list-count"></p>
      <div class="list-scroll" id="list-scroll"></div>
      <button id="list-close-btn" class="menu-close-btn">Cerrar</button>
    </div>
  </div>

</div>

// =========================================================================
// PERSISTENT "CUSTOM DICTIONARY" (formerly the static DavidDictionary)
// Stored in localStorage, editable via CSV import/export in the hamburger
// menu. Format: hanzi,pinyin,es
// =========================================================================
const CUSTOM_DICT_KEY = 'chineseFlashcards.customDictionary';

function loadCustomDictionary() {
  try {
    const raw = localStorage.getItem(CUSTOM_DICT_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error('Could not read custom dictionary', e);
    return [];
  }
}

function saveCustomDictionary(list) {
  try {
    localStorage.setItem(CUSTOM_DICT_KEY, JSON.stringify(list));
  } catch (e) {
    console.error('Could not save custom dictionary', e);
  }
}

// =========================================================================
// PERSISTENT "FORGOTTEN WORDS" LIST
// Stored in localStorage, per browser. Survives refresh.
// =========================================================================
const FORGOTTEN_KEY = 'chineseFlashcards.forgottenWords';

function loadForgotten() {
  try {
    const raw = localStorage.getItem(FORGOTTEN_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error('Could not read forgotten list', e);
    return [];
  }
}

function saveForgotten(list) {
  try {
    localStorage.setItem(FORGOTTEN_KEY, JSON.stringify(list));
  } catch (e) {
    console.error('Could not save forgotten list', e);
  }
}

function isInForgotten(hanzi) {
  return loadForgotten().some(w => w.hanzi === hanzi);
}

function addToForgotten(word) {
  const list = loadForgotten();
  if (!list.some(w => w.hanzi === word.hanzi)) {
    list.push({ hanzi: word.hanzi, pinyin: word.pinyin, es: word.es });
    saveForgotten(list);
  }
}

function removeFromForgotten(hanzi) {
  const list = loadForgotten().filter(w => w.hanzi !== hanzi);
  saveForgotten(list);
}

// =========================================================================
// CSV HELPERS (used by the hamburger menu to import/export CustomDictionary)
// Minimal RFC4180-ish parser/writer: handles quoted fields, commas and
// quotes inside fields, and CRLF or LF line endings.
// =========================================================================
function csvEscape(value) {
  const str = String(value ?? '');
  if (/[",\n]/.test(str)) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function dictionaryToCSV(list) {
  const lines = ['hanzi,pinyin,es'];
  for (const w of list) {
    lines.push([csvEscape(w.hanzi), csvEscape(w.pinyin), csvEscape(w.es)].join(','));
  }
  return lines.join('\n');
}

function parseCSV(text) {
  const rows = [];
  let field = '', row = [], inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === ',') {
        row.push(field); field = '';
      } else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); field = '';
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0].trim() === ''));
}

function csvToDictionary(text) {
  const rows = parseCSV(text.trim());
  if (rows.length === 0) return [];
  let startIdx = 0;
  const first = rows[0].map(c => c.trim().toLowerCase());
  if (first[0] === 'hanzi' && first[1] === 'pinyin' && first[2] === 'es') {
    startIdx = 1;
  }
  const list = [];
  for (let i = startIdx; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0] || !r[0].trim()) continue;
    list.push({ hanzi: (r[0] || '').trim(), pinyin: (r[1] || '').trim(), es: (r[2] || '').trim() });
  }
  return list;
}

function downloadCustomDictionary() {
  const csv = dictionaryToCSV(loadCustomDictionary());
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'diccionario-personal.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// =========================================================================
// PERSISTENT SESSION (current round survives refresh / backgrounding)
// Stores which sets are selected, the shuffled queue, the current word,
// and whether its answer is currently revealed.
// =========================================================================
const SESSION_KEY = 'chineseFlashcards.session';

function saveSession() {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ selected, queue, current, revealed }));
  } catch (e) {
    console.error('Could not save session', e);
  }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    console.error('Could not read session', e);
    return null;
  }
}

// =========================================================================
// STATE
// =========================================================================
let selected = { hsk1: true, hsk2: true, dict: true, forgotten: true };
let queue = [];
let current = null;
let revealed = false;

const el = {
  reshuffleBtn: document.getElementById('reshuffle-btn'),
  menuBtn: document.getElementById('menu-btn'),
  menuOverlay: document.getElementById('menu-overlay'),
  menuCount: document.getElementById('menu-count'),
  menuDownloadBtn: document.getElementById('menu-download-btn'),
  menuLoadBtn: document.getElementById('menu-load-btn'),
  menuViewDictBtn: document.getElementById('menu-view-dict-btn'),
  menuViewForgottenBtn: document.getElementById('menu-view-forgotten-btn'),
  menuCloseBtn: document.getElementById('menu-close-btn'),
  csvFileInput: document.getElementById('csv-file-input'),
  listOverlay: document.getElementById('list-overlay'),
  listTitle: document.getElementById('list-title'),
  listCount: document.getElementById('list-count'),
  listScroll: document.getElementById('list-scroll'),
  listCloseBtn: document.getElementById('list-close-btn'),
  btnHsk1: document.getElementById('btn-hsk1'),
  btnHsk2: document.getElementById('btn-hsk2'),
  btnDict: document.getElementById('btn-dict'),
  btnForgotten: document.getElementById('btn-forgotten'),
  progress: document.getElementById('progress'),
  flashcard: document.getElementById('flashcard'),
  forgotBtn: document.getElementById('forgot-btn'),
  rememberBtn: document.getElementById('remember-btn'),
};

function buildQueue() {
  let words = [];
  if (selected.hsk1) words = words.concat(HSK1.map(w => ({...w, set: 'HSK1'})));
  if (selected.hsk2) words = words.concat(HSK2.map(w => ({...w, set: 'HSK2'})));
  if (selected.dict) words = words.concat(loadCustomDictionary().map(w => ({...w, set: 'CustomDictionary'})));
  if (selected.forgotten) words = words.concat(loadForgotten().map(w => ({...w, set: 'Forgotten'})));
  // Fisher-Yates shuffle
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  queue = words;
}

function updateToggleUI() {
  el.btnHsk1.classList.toggle('active', selected.hsk1);
  el.btnHsk2.classList.toggle('active', selected.hsk2);
  el.btnDict.classList.toggle('active', selected.dict);
  el.btnForgotten.classList.toggle('active', selected.forgotten);
}

function updateProgress() {
  if (queue.length === 0 && !current) {
    el.progress.textContent = '';
    return;
  }
  const remaining = queue.length + (current ? 1 : 0);
  el.progress.textContent = 'Quedan ' + remaining + ' palabra' + (remaining === 1 ? '' : 's');
}

function setActionButtonsEnabled(enabled) {
  el.forgotBtn.classList.toggle('disabled', !enabled);
  el.rememberBtn.classList.toggle('disabled', !enabled);
}

function anySetSelected() {
  return selected.hsk1 || selected.hsk2 || selected.dict || selected.forgotten;
}

function renderEmptyState() {
  el.flashcard.classList.remove('revealed');
  el.flashcard.innerHTML =
    '<div class="empty-state">' +
      (anySetSelected()
        ? "🎉 ¡No hay más palabras en esta ronda!"
        : "Elige al menos una lista para empezar") +
      (anySetSelected() ? '<br><button class="restart-btn" id="restart-btn">Reiniciar ronda</button>' : '') +
    '</div>';
  setActionButtonsEnabled(false);
  updateProgress();
  const restartBtn = document.getElementById('restart-btn');
  if (restartBtn) restartBtn.addEventListener('click', startRound);
}

function renderCardFront() {
  revealed = false;
  el.flashcard.classList.remove('revealed');
  el.flashcard.innerHTML =
    '<div class="hanzi">' + current.hanzi + '</div>' +
    '<div class="hint">Toca para resolver</div>';
  setActionButtonsEnabled(false);
}

function renderCardBack() {
  revealed = true;
  el.flashcard.classList.add('revealed');
  el.flashcard.innerHTML =
    '<div class="hanzi">' + current.hanzi + '</div>' +
    '<div class="pinyin">' + current.pinyin + '</div>' +
    '<div class="translation">' + current.es + '</div>';
  setActionButtonsEnabled(true);
  saveSession();
}

function nextCard() {
  if (queue.length === 0) {
    current = null;
    renderEmptyState();
    saveSession();
    return;
  }
  current = queue.shift();
  renderCardFront();
  updateProgress();
  saveSession();
}

function startRound() {
  buildQueue();
  nextCard();
}

// --- Event listeners: card + answer buttons ---
el.flashcard.addEventListener('click', () => {
  if (!current) return;
  if (!revealed) {
    renderCardBack();
  }
});

el.forgotBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!revealed || !current) return;
  addToForgotten(current);
  nextCard();
});

el.rememberBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!revealed || !current) return;
  if (isInForgotten(current.hanzi)) {
    removeFromForgotten(current.hanzi);
  }
  nextCard();
});

// --- Event listeners: set toggles ---
el.btnHsk1.addEventListener('click', () => {
  selected.hsk1 = !selected.hsk1;
  updateToggleUI();
  startRound();
});

el.btnHsk2.addEventListener('click', () => {
  selected.hsk2 = !selected.hsk2;
  updateToggleUI();
  startRound();
});

el.btnDict.addEventListener('click', () => {
  selected.dict = !selected.dict;
  updateToggleUI();
  startRound();
});

el.btnForgotten.addEventListener('click', () => {
  selected.forgotten = !selected.forgotten;
  updateToggleUI();
  startRound();
});

// --- Event listeners: hamburger menu ---
function openMenu() {
  const count = loadCustomDictionary().length;
  el.menuCount.textContent = count + ' palabra' + (count === 1 ? '' : 's') + ' en el diccionario personal';
  el.menuOverlay.classList.remove('hidden');
}

function closeMenu() {
  el.menuOverlay.classList.add('hidden');
}

el.menuBtn.addEventListener('click', openMenu);
el.menuCloseBtn.addEventListener('click', closeMenu);
el.menuOverlay.addEventListener('click', (e) => {
  if (e.target === el.menuOverlay) closeMenu();
});

el.menuDownloadBtn.addEventListener('click', () => {
  downloadCustomDictionary();
});

el.menuLoadBtn.addEventListener('click', () => {
  el.csvFileInput.click();
});

// --- Event listeners: reshuffle button ---
el.reshuffleBtn.addEventListener('click', () => {
  startRound(); // forces a fresh shuffle, overwriting the saved session
});

// --- Event listeners: word list viewer (dictionary / forgotten) ---
function renderWordList(title, words) {
  el.listTitle.textContent = title;
  el.listCount.textContent = words.length + ' palabra' + (words.length === 1 ? '' : 's');
  if (words.length === 0) {
    el.listScroll.innerHTML = '<div class="list-empty">Todavía no hay palabras aquí.</div>';
  } else {
    el.listScroll.innerHTML = words.map(w =>
      '<div class="list-row">' +
        '<div class="l-hanzi">' + w.hanzi + '</div>' +
        '<div class="l-pinyin">' + w.pinyin + '</div>' +
        '<div class="l-es">' + w.es + '</div>' +
      '</div>'
    ).join('');
  }
  el.menuOverlay.classList.add('hidden');
  el.listOverlay.classList.remove('hidden');
}

el.menuViewDictBtn.addEventListener('click', () => {
  renderWordList('Diccionario personal', loadCustomDictionary());
});

el.menuViewForgottenBtn.addEventListener('click', () => {
  renderWordList('Difíciles de recordar', loadForgotten());
});

el.listCloseBtn.addEventListener('click', () => {
  el.listOverlay.classList.add('hidden');
});

el.listOverlay.addEventListener('click', (e) => {
  if (e.target === el.listOverlay) el.listOverlay.classList.add('hidden');
});

el.csvFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  e.target.value = ''; // reset so the same file can be picked again later
  if (!file) return;

  const proceed = confirm('Esto va a reemplazar tu diccionario personal actual por el contenido del CSV. ¿Continuar?');
  if (!proceed) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const list = csvToDictionary(reader.result);
      saveCustomDictionary(list);
      closeMenu();
      startRound();
    } catch (err) {
      alert('No se pudo leer el CSV. Revisa el formato (hanzi,pinyin,es).');
      console.error(err);
    }
  };
  reader.onerror = () => {
    alert('No se pudo leer el archivo.');
  };
  reader.readAsText(file, 'UTF-8');
});

// --- Init ---
(function init() {
  const session = loadSession();
  if (session && session.selected) {
    selected = session.selected;
    queue = Array.isArray(session.queue) ? session.queue : [];
    current = session.current || null;
    revealed = !!session.revealed;
    updateToggleUI();
    if (current) {
      if (revealed) {
        renderCardBack();
      } else {
        renderCardFront();
      }
      updateProgress();
    } else if (queue.length > 0) {
      nextCard();
    } else {
      renderEmptyState();
    }
  } else {
    updateToggleUI();
    startRound();
  }
})();
</script>
